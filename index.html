<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChefVision AI - Control de Cocina</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

    <style>
        body { font-family: sans-serif; margin: 0; background: #121212; color: white; text-align: center; }
        #video-container { width: 100%; height: 40vh; background: #000; overflow: hidden; position: relative; border-bottom: 4px solid #e74c3c; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .controls { padding: 20px; }
        button { background: #e74c3c; border: none; color: white; padding: 15px 25px; border-radius: 10px; font-size: 16px; font-weight: bold; margin: 10px; width: 80%; }
        .result-card { background: #1e1e1e; margin: 15px; padding: 20px; border-radius: 15px; display: none; border: 1px solid #333; }
        select, input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; font-size: 16px; }
        #status { color: #f1c40f; font-size: 14px; margin-top: 5px; }
        canvas { display: none; }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="webcam" autoplay playsinline></video>
    </div>
    <p id="status">Iniciando sistema...</p>

    <canvas id="canvas"></canvas>

    <div class="controls">
        <button onclick="takePhoto()">📸 ESCANEAR PRODUCTO</button>
    </div>

    <div id="resultCard" class="result-card">
        <h2 style="margin-top:0;">Detectado: <span id="itemName" style="color:#e74c3c">...</span></h2>
        
        <label>¿A qué preparación va?</label>
        <select id="recetaSelect">
            <option value="Servicio Diario">Servicio Diario (Gasto)</option>
            <option value="Producción Salsa">Producción: Salsa</option>
            <option value="Producción Caldo">Producción: Caldo</option>
            <option value="Mermas">Mermas / Desperdicio</option>
        </select>

        <input type="text" id="loteInput" placeholder="Número de Lote (opcional)">
        
        <button onclick="confirmarGasto()" style="background:#27ae60">CONFIRMAR Y GUARDAR</button>
        <button onclick="cancelar()" style="background:#7f8c8d; font-size: 12px;">Cancelar</button>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const status = document.getElementById('status');
        const urlScript = "https://script.google.com/macros/s/AKfycby-RIRixdbuJ_8vpcIcrESUHBqej8UamZdmWlaHRI8Okri7LXu9jkmOgpJ-zrlKzbeT9w/exec";
        
        let model;

        // 1. Iniciar Cámara y Cargar IA
        async function setupApp() {
            try {
                // Cargar Cámara
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                video.srcObject = stream;

                // Cargar Modelo IA
                status.innerText = "Cargando cerebro de IA...";
                model = await mobilenet.load();
                status.innerText = "Listo para escanear";
            } catch (err) {
                status.innerText = "Error: Asegúrate de usar HTTPS y dar permisos.";
            }
        }

        // 2. Capturar y Reconocer
        async function takePhoto() {
            if (!model) return;
            status.innerText = "Analizando...";
            
            // La IA analiza el video directamente
            const predictions = await model.classify(video);
            
            // Cogemos la primera predicción (la más probable)
            const nombreTraducido = traducir(predictions[0].className);
            document.getElementById('itemName').innerText = nombreTraducido;
            document.getElementById('resultCard').style.display = "block";
            status.innerText = "Reconocimiento listo";
        }

        // 3. Enviar a Google Sheets
        async function confirmarGasto() {
            const item = document.getElementById('itemName').innerText;
            const receta = document.getElementById('recetaSelect').value;
            const lote = document.getElementById('loteInput').value || "N/A";

            status.innerText = "Guardando en Drive...";

            const datos = {
                producto: item,
                lote: lote,
                preparacion: receta,
                cantidad: 1
            };

            try {
                await fetch(urlScript, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(datos)
                });
                alert("✅ Registrado correctamente");
                document.getElementById('resultCard').style.display = "none";
                status.innerText = "Listo para el siguiente";
            } catch (error) {
                alert("Error al guardar. Revisa la URL del script.");
            }
        }

        function cancelar() {
            document.getElementById('resultCard').style.display = "none";
            status.innerText = "Listo";
        }

        // Función simple para limpiar nombres de la IA (vienen en inglés)
        function traducir(texto) {
            if(texto.includes("tomato")) return "Tomate/Rojo";
            if(texto.includes("bottle")) return "Botella/Líquido";
            if(texto.includes("bread")) return "Pan/Harina";
            return texto.split(',')[0]; // Si no sabe qué es, da el nombre en inglés
        }

        setupApp();
    </script>
</body>
</html>
