<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Divina Italia El Charco</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#c9a96e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="screenHome" class="screen active">
        <div class="hero-canario">
            <div class="hero-overlay"></div>
            <img src="icons/logo-hero.png" alt="Divina Italia" class="logo-principal">
        </div>

        <div class="grid-stats">
            <div class="stat-card" onclick="irA('screenCocina')">
                <div class="stat-icon">&#x1F373;</div>
                <div class="stat-label">Cocina</div>
                <div class="stat-desc">REGISTRO</div>
            </div>
            
            <div class="stat-card" onclick="irA('screenProductos')">
                <div class="stat-icon">&#x1F4DA;</div>
                <div class="stat-label">Productos</div>
                <div class="stat-desc">BIBLIOTECA</div>
            </div>
            
            <div class="stat-card" onclick="irA('screenStock')">
                <div class="stat-icon">&#x1F4E6;</div>
                <div class="stat-label">Almacén</div>
                <div class="stat-desc">STOCK</div>
            </div>
            
            <div class="stat-card" onclick="irA('screenCompras')">
                <div class="stat-icon">&#x1F6D2;</div>
                <div class="stat-label">Compras</div>
                <div class="stat-desc">PEDIDOS</div>
            </div>
            
            <div class="stat-card" onclick="irA('screenDashboard')">
                <div class="stat-icon">&#x1F4CA;</div>
                <div class="stat-label">Resumen</div>
                <div class="stat-desc">SEMANAL</div>
            </div>
        </div>
    </div>

    <div id="screenCocina" class="screen">
        <div class="app-header">
            <img src="icons/logo-hero.png" class="logo-small" onclick="irA('screenHome')">
        </div>
        <div class="section-header">
            <h2 class="section-title">REGISTRO DE COCINA</h2>
            <p style="color: var(--muted)">Elabora y registra ingredientes</p>
        </div>
        <div class="screen-content">
            <div class="card">
                <label>🍳 ¿Qué preparas?</label>
                <div id="listaElaboraciones" class="grid-elab"></div> 
            </div>

            <div id="listaIngredientes"></div>

            <div class="action-buttons">
                <button id="btnGuardarSesion" class="btn-save hidden" onclick="guardarSesion()">
                    GUARDAR REGISTRO
                </button>
            </div>
        </div>
    </div>

    <div id="screenProductos" class="screen">
        <div class="app-header">
            <img src="icons/logo-hero.png" class="logo-small" onclick="irA('screenHome')">
        </div>
        <div class="screen-content">
            <div class="section-header"><h2 class="section-title">Biblioteca</h2></div>
            <div class="card">
                <input type="text" id="buscadorProductos" placeholder="Buscar producto..." oninput="filtrarProductos(this.value)">
                <div id="listaProductos"></div>
            </div>
        </div>
    </div>

    <div id="screenStock" class="screen">
        <div class="app-header">
            <img src="icons/logo-hero.png" class="logo-small" onclick="irA('screenHome')">
        </div>
        <div class="screen-content">
            <div class="section-header"><h2 class="section-title">Stock Almacén</h2></div>
            <div class="card"><p style="text-align:center; color:var(--muted);">Gestión de inventario próximamente...</p></div>
        </div>
    </div>

    <div id="screenCompras" class="screen">
        <div class="app-header">
            <img src="icons/logo-hero.png" class="logo-small" onclick="irA('screenHome')">
        </div>
        <div class="screen-content">
            <div class="section-header"><h2 class="section-title">Pedidos</h2></div>
            <div class="card">
                <select id="gProveedor" onchange="cargarProductosProveedor()">
                    <option value="">Seleccionar Proveedor...</option>
                    <option>Matteo Comit</option><option>Tías Fruit</option>
                </select>
            </div>
        </div>
    </div>

    <div id="screenDashboard" class="screen">
        <div class="app-header">
            <img src="icons/logo-hero.png" class="logo-small" onclick="irA('screenHome')">
        </div>
        <div class="screen-content">
            <div class="section-header"><h2 class="section-title">Resumen Semanal</h2></div>
            <div id="dashContent"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
